<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goldberg Planet</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #05060a; height: 100%; }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }
    .hud {
      position: fixed; font-family: 'Cascadia Mono', Consolas, monospace; font-size: 12px;
      color: #cfd8e3; pointer-events: none; user-select: none; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
    #stats { top: 10px; left: 12px; line-height: 1.5; white-space: pre; }
    #help {
      bottom: 10px; left: 12px; line-height: 1.45; color: #8fa0b3; white-space: pre;
    }
    #msg { top: 10px; right: 12px; text-align: right; line-height: 1.5; color: #a8c6e8; white-space: pre; }
    #crosshair {
      top: 50%; left: 50%; width: 4px; height: 4px; margin: -2px 0 0 -2px;
      background: rgba(255,255,255,0.85); border-radius: 50%;
      box-shadow: 0 0 3px rgba(0,0,0,0.9);
    }
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #05060a; color: #cfd8e3; font-family: Consolas, monospace; font-size: 14px;
      z-index: 10; flex-direction: column; gap: 12px;
    }
    #splash .bar { width: 260px; height: 3px; background: #1a2230; }
    #splash .bar > div { height: 100%; width: 0%; background: #5b8fd6; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="splash"><div>forging planet…</div><div class="bar"><div id="splashbar"></div></div><div id="splashmsg" style="color:#5f7189;font-size:12px"></div></div>
  <div id="stats" class="hud"></div>
  <div id="msg" class="hud"></div>
  <div id="crosshair" class="hud"></div>
  <div id="help" class="hud">click     lock mouse (or drag to look) | WASD move
space     jump - HOLD in air to GLIDE | swim up in water
F         creative fly (space/ctrl up/down, shift boost)
wheel     zoom: first person to whole-planet orbit and back
LMB mine  | RMB build
G         autopilot circumnavigation | O orbit pull-back demo</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
