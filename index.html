<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Goldberg Planet</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 28,9 28,23 16,30 4,23 4,9' fill='%236fae4e' stroke='%232c4a22' stroke-width='2'/%3E%3C/svg%3E" />
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden; background: #05060a; height: 100%;
      user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
      touch-action: none; overscroll-behavior: none;
    }
    #app { position: fixed; inset: 0; touch-action: none; }
    #app canvas { display: block; }
    .hud {
      position: fixed; font-family: 'Cascadia Mono', Consolas, ui-monospace, monospace; font-size: 12px;
      color: #cfd8e3; pointer-events: none; user-select: none; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
    #vitals {
      top: calc(8px + env(safe-area-inset-top)); left: calc(10px + env(safe-area-inset-left));
      font-size: 11px; color: #6d7d94; letter-spacing: 0.3px;
    }
    #diag {
      top: calc(28px + env(safe-area-inset-top)); left: calc(10px + env(safe-area-inset-left));
      line-height: 1.55; white-space: pre; display: none;
      background: rgba(8, 12, 20, 0.5); border: 1px solid rgba(140,160,190,0.14); border-radius: 8px;
      padding: 8px 10px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #help {
      bottom: calc(12px + env(safe-area-inset-bottom)); left: calc(12px + env(safe-area-inset-left));
      line-height: 1.6; color: #7e8fa5; white-space: pre; font-size: 11.5px;
      opacity: 1; transition: opacity 0.7s;
    }
    #help.hide { opacity: 0; }
    #msg {
      bottom: calc(126px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      color: #dfe9f6; text-align: center; line-height: 1.5; max-width: 84vw;
      opacity: 0; transition: opacity 0.3s;
      background: rgba(8, 12, 20, 0.55); border: 1px solid rgba(140,160,190,0.16); border-radius: 9px;
      padding: 5px 12px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    }
    #msg.on { opacity: 1; }
    #flight {
      bottom: calc(96px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      color: #a8bcd6; font-size: 12px; letter-spacing: 0.6px; display: none; white-space: pre;
    }
    #slotname {
      bottom: calc(72px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      color: #c3d2e6; font-size: 11px; letter-spacing: 0.8px; opacity: 0; transition: opacity 0.3s;
    }
    #slotname.on { opacity: 1; }
    #crosshair {
      top: 50%; left: 50%; width: 4px; height: 4px; margin: -2px 0 0 -2px;
      background: rgba(255,255,255,0.85); border-radius: 50%;
      box-shadow: 0 0 3px rgba(0,0,0,0.9);
    }
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #05060a; color: #cfd8e3; font-family: Consolas, monospace; font-size: 14px;
      z-index: 10; flex-direction: column; gap: 12px;
    }
    #splash .bar { width: 260px; height: 3px; background: #1a2230; }
    #splash .bar > div { height: 100%; width: 0%; background: #5b8fd6; transition: width 0.2s; }
    #hotbar {
      bottom: calc(12px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; pointer-events: auto;
    }
    #hotbar .slot {
      width: 50px; height: 50px; position: relative; border-radius: 8px;
      background: rgba(10, 14, 22, 0.5); border: 1.5px solid rgba(150, 165, 185, 0.3);
      box-sizing: border-box; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #hotbar .slot.sel { border-color: #e8eef6; background: rgba(30, 38, 54, 0.72); }
    #hotbar .swatch {
      position: absolute; inset: 8px; border-radius: 4px;
      box-shadow: inset -2px -3px 0 rgba(0,0,0,0.25), inset 2px 2px 0 rgba(255,255,255,0.18);
    }
    #hotbar .key { position: absolute; top: 2px; left: 5px; font-size: 9px; color: #93a3b8; }
    #hotbar .count { position: absolute; bottom: 2px; right: 5px; font-size: 11px; color: #eef3fa; text-shadow: 0 1px 2px rgba(0,0,0,0.9); }

    .rally-menu {
      position: fixed; inset: 0; z-index: 18; display: grid; place-items: center;
      padding: calc(18px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right))
        calc(18px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
      background: rgba(2, 5, 9, 0.62); pointer-events: auto;
      font-family: 'Cascadia Mono', Consolas, ui-monospace, monospace;
      color: #eef5f8; box-sizing: border-box;
    }
    .rally-menu.hidden { display: none; }
    .rally-panel {
      width: min(580px, calc(100vw - 32px)); max-height: min(760px, calc(100vh - 36px));
      overflow: auto; box-sizing: border-box; border-radius: 8px;
      padding: 24px; background: rgba(9, 16, 22, 0.88);
      border: 1px solid rgba(166, 196, 205, 0.28);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
    }
    .rally-panel.compact { width: min(430px, calc(100vw - 32px)); }
    .rally-panel.failed { border-color: rgba(255, 106, 99, 0.55); }
    .rally-mark {
      display: inline-grid; place-items: center; width: 58px; height: 58px; margin-bottom: 14px;
      border-radius: 50%; color: #0b1015; background: #ffd166; font-size: 18px; font-weight: 800;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.16);
    }
    .rally-kicker {
      margin: 0 0 8px; color: #78d6ff; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em;
    }
    .rally-panel h1, .rally-panel h2 {
      margin: 0; letter-spacing: 0; line-height: 1.02; color: #f8fbfc; font-weight: 800;
    }
    .rally-panel h1 { font-size: clamp(38px, 7vw, 68px); }
    .rally-panel h2 { font-size: 34px; }
    .rally-copy {
      margin: 14px 0 14px; max-width: 48ch; color: #b8c9ce; line-height: 1.55; font-size: 15px;
    }
    .rally-route-chip {
      display: inline-flex; align-items: center; min-height: 30px; margin: 2px 0 18px;
      padding: 0 10px; border: 1px solid rgba(255, 209, 102, 0.46); border-radius: 999px;
      color: #ffe3a0; background: rgba(255, 209, 102, 0.08); font-size: 12px;
    }
    .rally-actions {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px;
    }
    .rally-actions.vertical { flex-direction: column; }
    .rally-actions button, .rally-route, .rally-settings button {
      min-height: 44px; border-radius: 8px; border: 1px solid rgba(165, 190, 198, 0.34);
      background: rgba(20, 32, 39, 0.92); color: #e9f2f5; padding: 0 16px;
      font: inherit; font-size: 13px; cursor: pointer;
    }
    .rally-actions button.primary {
      color: #0b1014; background: #8cf2ac; border-color: #b7ffd0; font-weight: 800;
    }
    .rally-actions button:hover, .rally-route:hover, .rally-settings button:hover {
      border-color: rgba(120, 214, 255, 0.74);
    }
    .rally-actions button:focus-visible, .rally-route:focus-visible, .rally-settings button:focus-visible {
      outline: 2px solid #78d6ff; outline-offset: 2px;
    }
    .rally-route-list { display: grid; gap: 10px; margin-top: 16px; }
    .rally-route {
      width: 100%; height: auto; padding: 14px; display: grid; gap: 6px; text-align: left;
    }
    .rally-route.selected { border-color: #ffd166; background: rgba(46, 39, 22, 0.96); }
    .rally-route strong { font-size: 16px; color: #ffffff; }
    .rally-route span { color: #bacbd0; line-height: 1.35; }
    .rally-route em { color: #ffd166; font-size: 12px; font-style: normal; }
    .rally-control-grid {
      display: grid; grid-template-columns: minmax(98px, 0.42fr) 1fr; gap: 9px 12px; margin-top: 16px;
      color: #c7d5da; align-items: center;
    }
    .rally-control-grid span {
      color: #ffd166; font-size: 12px; text-transform: uppercase;
    }
    .rally-control-grid strong { font-size: 13px; font-weight: 600; }
    .rally-settings { display: grid; gap: 10px; margin-top: 16px; }
    .rally-settings button {
      display: flex; justify-content: space-between; align-items: center; gap: 18px; width: 100%;
    }
    .rally-settings span { color: #b8c9ce; }
    .rally-settings strong { color: #ffd166; }
    .rally-results {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 18px;
    }
    .rally-results div {
      min-height: 62px; padding: 10px; border-radius: 8px;
      border: 1px solid rgba(166, 196, 205, 0.22); background: rgba(3, 8, 12, 0.45);
    }
    .rally-results span { display: block; color: #86a1a8; font-size: 11px; text-transform: uppercase; }
    .rally-results strong { display: block; margin-top: 7px; color: #ffffff; font-size: 20px; }
    .rally-frontier-results {
      display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin-top: 10px;
    }
    .rally-frontier-results div {
      min-height: 52px; padding: 9px; border-radius: 8px;
      border: 1px solid rgba(255, 209, 102, 0.24); background: rgba(32, 23, 8, 0.36);
    }
    .rally-frontier-results span { display: block; color: #c7aa6a; font-size: 10px; text-transform: uppercase; }
    .rally-frontier-results strong { display: block; margin-top: 6px; color: #ffe7a8; font-size: 13px; line-height: 1.2; }

    .rally-hud {
      position: fixed; inset: 0; z-index: 13; pointer-events: none;
      font-family: 'Cascadia Mono', Consolas, ui-monospace, monospace; color: #eaf8fb;
      text-shadow: 0 1px 2px rgba(0,0,0,0.85);
    }
    .rally-hud.hidden { display: none; }
    .rally-hud__top {
      position: absolute; top: calc(12px + env(safe-area-inset-top)); left: calc(14px + env(safe-area-inset-left));
      right: calc(14px + env(safe-area-inset-right)); display: flex; justify-content: space-between; gap: 14px;
      align-items: flex-start;
    }
    .rally-objective {
      max-width: min(420px, 48vw); padding: 8px 11px; border-left: 3px solid #78d6ff;
      background: rgba(5, 11, 16, 0.52);
    }
    .rally-objective span { display: block; color: #8fe4ff; font-size: 11px; text-transform: uppercase; }
    .rally-objective strong { display: block; color: #ffffff; font-size: 20px; margin-top: 3px; }
    .rally-counters {
      display: grid; grid-template-columns: repeat(3, minmax(74px, 1fr)); gap: 8px; min-width: 250px;
    }
    .rally-counters div {
      height: 50px; box-sizing: border-box; padding: 6px 9px; text-align: right;
      background: rgba(5, 11, 16, 0.54); border: 1px solid rgba(141, 216, 255, 0.18); border-radius: 8px;
    }
    .rally-counters span { display: block; color: #91a7ae; font-size: 10px; text-transform: uppercase; }
    .rally-counters strong { display: block; color: #ffffff; margin-top: 4px; font-size: 17px; font-variant-numeric: tabular-nums; }
    .rally-hud__bottom {
      position: absolute; left: calc(14px + env(safe-area-inset-left)); right: calc(14px + env(safe-area-inset-right));
      bottom: calc(78px + env(safe-area-inset-bottom)); display: flex; justify-content: space-between; gap: 12px;
      align-items: flex-end;
    }
    .rally-flight {
      display: flex; flex-wrap: wrap; gap: 8px; max-width: min(620px, 68vw);
    }
    .rally-flight span, .rally-progress {
      min-width: 78px; box-sizing: border-box; padding: 6px 9px; border-radius: 999px;
      background: rgba(5, 11, 16, 0.56); border: 1px solid rgba(141, 216, 255, 0.2);
      color: #cfeef5; font-size: 12px; font-variant-numeric: tabular-nums; text-align: center;
    }
    .rally-progress { color: #ffd166; }
    .rally-hint {
      position: absolute; left: 50%; top: calc(82px + env(safe-area-inset-top)); transform: translateX(-50%);
      max-width: min(720px, calc(100vw - 32px)); min-height: 28px; box-sizing: border-box;
      padding: 6px 12px; border-radius: 999px; background: rgba(5, 11, 16, 0.54);
      border: 1px solid rgba(255, 209, 102, 0.32); color: #ffe3a0; text-align: center; font-size: 12px;
    }
    .rally-hud.failed .rally-hint { color: #ffbbb8; border-color: rgba(255, 94, 91, 0.45); }
    .rally-hud.complete .rally-hint { color: #c9ffd6; border-color: rgba(140, 242, 172, 0.48); }

    .frontier-hud {
      position: fixed; top: calc(112px + env(safe-area-inset-top)); left: calc(14px + env(safe-area-inset-left));
      z-index: 12; width: min(390px, calc(100vw - 28px)); box-sizing: border-box;
      padding: 11px; border-radius: 8px; pointer-events: none;
      font-family: 'Cascadia Mono', Consolas, ui-monospace, monospace;
      color: #edf6ec; background: rgba(7, 13, 10, 0.62);
      border: 1px solid rgba(140, 242, 172, 0.28);
      text-shadow: 0 1px 2px rgba(0,0,0,0.85);
    }
    .frontier-hud.hidden { display: none; }
    .frontier-hud__head span {
      display: block; color: #8cf2ac; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .frontier-hud__head strong {
      display: block; margin-top: 3px; color: #ffffff; font-size: 16px; line-height: 1.25;
    }
    .frontier-hud__grid {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; margin-top: 10px;
    }
    .frontier-hud__grid div {
      min-height: 46px; padding: 6px; box-sizing: border-box; border-radius: 8px;
      background: rgba(0, 0, 0, 0.24); border: 1px solid rgba(140, 242, 172, 0.16);
    }
    .frontier-hud__grid span {
      display: block; color: #9fb9a7; font-size: 10px; text-transform: uppercase;
    }
    .frontier-hud__grid strong {
      display: block; margin-top: 5px; color: #f7fff7; font-size: 13px; font-variant-numeric: tabular-nums;
    }
    .frontier-hud__foot {
      display: grid; gap: 4px; margin-top: 9px; color: #c7d8ca; font-size: 11px; line-height: 1.35;
    }
    .frontier-hud__foot strong { color: #ffe3a0; font-weight: 700; }

    /* --- touch controls (enabled by adding .touch to body) --- */
    #joy {
      position: fixed; width: 128px; height: 128px; border-radius: 50%; display: none;
      background: rgba(10, 14, 24, 0.25); border: 1.5px solid rgba(165, 185, 210, 0.28);
      pointer-events: none; z-index: 5;
    }
    #joyknob {
      position: absolute; width: 56px; height: 56px; left: 36px; top: 36px; border-radius: 50%;
      background: rgba(185, 200, 222, 0.4); border: 1.5px solid rgba(215, 228, 245, 0.5);
    }
    .tbtn {
      position: fixed; border-radius: 50%; display: none; z-index: 5;
      background: rgba(10, 14, 24, 0.38); border: 1.5px solid rgba(165, 185, 210, 0.34);
      color: #dfe8f4; pointer-events: auto; user-select: none;
      font-family: 'Cascadia Mono', Consolas, ui-monospace, monospace;
      align-items: center; justify-content: center; flex-direction: column; line-height: 1.1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
    .tbtn.press { background: rgba(95, 125, 175, 0.5); border-color: rgba(200, 218, 240, 0.6); }
    .tbtn .sub { font-size: 9px; color: #9fb0c6; }
    #btn-jump {
      width: 76px; height: 76px; font-size: 26px;
      right: calc(22px + env(safe-area-inset-right)); bottom: calc(118px + env(safe-area-inset-bottom));
    }
    #btn-down {
      width: 58px; height: 58px; font-size: 20px;
      right: calc(112px + env(safe-area-inset-right)); bottom: calc(96px + env(safe-area-inset-bottom));
    }
    #btn-plane {
      width: 60px; height: 60px; font-size: 21px;
      right: calc(30px + env(safe-area-inset-right)); bottom: calc(214px + env(safe-area-inset-bottom));
    }
    #btn-plane.ready { border-color: rgba(150, 210, 145, 0.7); color: #cdeec8; }

    body.touch #help { display: none; }
    body.touch #crosshair { display: none; }
    body.touch #btn-jump { display: flex; }
    body.touch #btn-down.show { display: flex; }
    body.touch #btn-plane.show { display: flex; }
    body.touch #hotbar .slot { width: 46px; height: 46px; }
    body.touch #hotbar .key { display: none; }
    @media (max-width: 480px) {
      body.touch #hotbar .slot { width: 42px; height: 42px; }
      body.touch #hotbar { gap: 4px; }
      .rally-panel { padding: 18px; }
      .rally-panel h1 { font-size: 38px; }
      .rally-panel h2 { font-size: 28px; }
      .rally-actions { display: grid; grid-template-columns: 1fr; }
      .rally-results { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .rally-frontier-results { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .rally-hud__top { display: grid; gap: 8px; }
      .rally-objective { max-width: none; }
      .rally-counters { min-width: 0; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .rally-counters div { padding: 5px 6px; }
      .rally-counters strong { font-size: 14px; }
      .rally-hint { top: calc(138px + env(safe-area-inset-top)); font-size: 11px; }
      .rally-hud__bottom { bottom: calc(68px + env(safe-area-inset-bottom)); }
      .rally-flight { max-width: 68vw; gap: 5px; }
      .rally-flight span, .rally-progress { min-width: 66px; padding: 5px 7px; font-size: 10px; }
      .frontier-hud {
        top: calc(54px + env(safe-area-inset-top)); bottom: auto; left: calc(10px + env(safe-area-inset-left));
        width: min(360px, calc(100vw - 20px));
      }
      .frontier-hud__grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="splash"><div>forging planet…</div><div class="bar"><div id="splashbar"></div></div><div id="splashmsg" style="color:#5f7189;font-size:12px"></div></div>
  <div id="vitals" class="hud"></div>
  <div id="diag" class="hud"></div>
  <div id="msg" class="hud"></div>
  <div id="flight" class="hud"></div>
  <div id="slotname" class="hud"></div>
  <div id="crosshair" class="hud"></div>
  <div id="hotbar" class="hud"></div>
  <div id="help" class="hud">WASD move · space jump · shift sprint · wheel zoom
LMB mine + chop · RMB build · 1-5 pick block
E plane (12 wood) · F fly · F3 stats · H help</div>
  <div id="joy"><div id="joyknob"></div></div>
  <div id="btn-jump" class="tbtn">▲</div>
  <div id="btn-down" class="tbtn">▼</div>
  <div id="btn-plane" class="tbtn">✈</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
